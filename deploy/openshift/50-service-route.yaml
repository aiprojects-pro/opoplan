apiVersion: v1
kind: Service
metadata:
  name: opoplan
  namespace: opoplan
  labels:
    app.kubernetes.io/name: opoplan
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: opoplan
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
---
# Route con TLS edge: el router de OpenShift termina TLS con su cert wildcard
# del cluster (o con uno propio que tengas configurado).
#
# Sustituye `host:` por el dominio real una vez tengas el DNS apuntado al
# router. Si dejas `host:` vacío, OpenShift genera uno automáticamente
# bajo *.apps.<cluster-domain>.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: opoplan
  namespace: opoplan
  labels:
    app.kubernetes.io/name: opoplan
  annotations:
    haproxy.router.openshift.io/timeout: "60s"
    # Sticky para conexiones WebSocket (/ws). El cluster es 1 replica así que
    # técnicamente no hace falta, pero es defensive en caso de escalar.
    haproxy.router.openshift.io/balance: "source"
spec:
  # host: opoplan.apps.tu-cluster-okd.example.com   # descomenta y ajusta
  to:
    kind: Service
    name: opoplan
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
