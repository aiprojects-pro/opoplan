# Secret con toda la configuración sensible. ANTES de aplicar:
#
#   1. Genera SESSION_SECRET de 32+ caracteres:
#        openssl rand -hex 32
#
#   2. Genera VAPID keys con web-push (o `npx web-push generate-vapid-keys`).
#
#   3. Sustituye los valores REPLACE_ME debajo y aplica.
#
#      Alternativa segura: gestiona estos secretos con External Secrets
#      Operator + Vault si ya lo tienes en el cluster, en lugar de versionar
#      este YAML con los valores reales.
#
# Las contraseñas iniciales de SUPERADMIN y ADMIN solo se usan al primer
# arranque (initContainer); después puedes borrar el campo o cambiarlo —
# el script lee el JSON existente y NO sobrescribe usuarios.

apiVersion: v1
kind: Secret
metadata:
  name: opoplan-config
  namespace: opoplan
type: Opaque
stringData:
  # ── Server ──
  SESSION_SECRET: "REPLACE_ME_32_CHARS_MIN_openssl_rand_hex_32"
  APP_URL: "https://opoplan.apps.tu-cluster-okd.example.com"
  NODE_ENV: "production"
  BCRYPT_ROUNDS: "12"

  # ── Web push ──
  VAPID_PUBLIC_KEY: "REPLACE_ME"
  VAPID_PRIVATE_KEY: "REPLACE_ME"

  # ── Email (opcional, Resend recomendado) ──
  EMAIL_PROVIDER: "mock"   # cambia a "resend" cuando tengas la key
  EMAIL_FROM: "OpoPlan CGD <noreply@cgd.example.com>"
  RESEND_API_KEY: ""

  # ── Storage local en el PVC (puedes pasar a r2/s3 más adelante) ──
  STORAGE_PROVIDER: "local"

  # ── IA (opcional) ──
  AI_PROVIDER: "mock"

  # ── Stripe (opcional, solo si cobras online) ──
  STRIPE_SECRET_KEY: ""
  STRIPE_PUBLISHABLE_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""

  # ── Bootstrap inicial (solo se usan en el initContainer si data/ está vacío) ──
  ORG_NAME: "CGD E-Learning Center"
  ORG_SLUG: "cgd"
  ADMIN_NAME: "Administradora CGD"
  ADMIN_EMAIL: "ai@frigodar.com"
  ADMIN_PASSWORD: "REPLACE_ME_temporal_se_pide_cambio_en_login"
  SUPERADMIN_NAME: "Superadmin"
  SUPERADMIN_EMAIL: "root@frigodar.com"
  SUPERADMIN_PASSWORD: "REPLACE_ME_temporal_se_pide_cambio_en_login"
